<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Calorie Counter{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">
    <nav class="bg-indigo-600 text-white p-4 shadow-md">
        <div class="container mx-auto max-w-2xl flex justify-between items-center">
            <a href="{% url 'index' %}" class="text-xl font-bold">CalorieTracker</a>
            <div class="space-x-4">
                <a href="{% url 'index' %}" class="hover:underline">Home</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8 max-w-2xl">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="text-center py-8 text-gray-500 text-sm">
        <p>&copy; 2026 Calorie Counter App. Built with Django & Tailwind CSS.</p>
    </footer>
</body>
</html>
